name: CI

on:
  push:
    paths:
      - 'Crosspose.sln'
      - 'src/**'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'Crosspose.sln'
      - 'src/**'
      - '.github/workflows/ci.yml'

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Crosspose.sln

      - name: Build
        run: dotnet build Crosspose.sln --no-restore --configuration Release

      - name: Test
        run: >
          dotnet test Crosspose.sln
          --no-build
          --configuration Release
          --filter "FullyQualifiedName!~Integration"
          --logger "github;annotations.titleFormat=@title"
          --logger "console;verbosity=normal"
