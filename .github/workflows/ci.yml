name: CI

on:
  push:
    paths:
      - 'Crosspose.sln'
      - 'src/**'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'Crosspose.sln'
      - 'src/**'
      - '.github/workflows/ci.yml'

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Crosspose.sln

      - name: Build
        run: dotnet build Crosspose.sln --no-restore --configuration Release

      - name: Test
        run: >
          dotnet test Crosspose.UnitTests.slnf
          --no-build
          --configuration Release
          --logger "console;verbosity=normal"
          --logger "trx;LogFileName=results.trx"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: '**/*.trx'
